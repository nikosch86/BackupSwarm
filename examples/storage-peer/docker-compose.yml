# Pure storage-peer template: serves chunks for swarm peers, backs up
# nothing of its own. See README.md for setup.

services:
  init:
    image: busybox:1.37
    volumes:
      - data:/data
    command: chown -R 65532:65532 /data
    restart: "no"

  storage-peer:
    image: ghcr.io/nikosch86/backupswarm:latest
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      BACKUPSWARM_INVITE_TOKEN: "${BACKUPSWARM_INVITE_TOKEN:?must be set; see README.md}"
      BACKUPSWARM_ADVERTISE_ADDR: "${BACKUPSWARM_ADVERTISE_ADDR:-}"
    volumes:
      - data:/data
    ports:
      - "7777:7777/udp"
    command:
      - run
      - --listen
      - 0.0.0.0:7777
      - --max-storage
      - 100g

volumes:
  data:
