# Dual-role template: backs up its own --backup-dir AND stores chunks
# for other swarm peers. The most common operator setup. See README.md.

services:
  dual-role:
    image: ghcr.io/nikosch86/backupswarm:main-dev
    restart: unless-stopped
    environment:
      BACKUPSWARM_INVITE_TOKEN: "${BACKUPSWARM_INVITE_TOKEN:?must be set; see README.md}"
      BACKUPSWARM_ADVERTISE_ADDR: "${BACKUPSWARM_ADVERTISE_ADDR:-}"
    volumes:
      - data:/data
      # Bind-mount the directory you want backed up. Adjust the host path.
      - ./backup:/backup:ro
    ports:
      - "7779:7779/udp"
    command:
      - run
      - --listen
      - 0.0.0.0:7779
      - --backup-dir
      - /backup
      - --max-storage
      - 100g

volumes:
  data:
