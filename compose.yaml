# Four-node swarm with daemon-mode invite issuance and post-startup
# peer dial.
#
#   * node-b is the founder daemon, running `run --invite --token-out
#     /shared/token-a.txt --backup-dir /backup-b` so it scans its own
#     payload and ships chunks to the joiners (founder-as-source).
#   * node-a joins via that token and continues as a backup source.
#   * inviter-c / inviter-d are oneshots that run `invite` against
#     node-b's data dir to write fresh tokens to /shared.
#   * node-c joins after inviter-c; node-d joins after node-c so the
#     fourth join arrives once node-a is past its initial scan.
#
# Fixed IPs on the bridge network keep the `invite`-emitted listen.addr
# routable — binding to 0.0.0.0 would embed a wildcard in the token.

services:
  # One-off prep: seed node-a's backup volume and chown all named
  # volumes to UID 65532 (the distroless `nonroot` user the
  # backupswarm image runs as). Without the chown, freshly-created
  # docker volumes land root-owned and writes from the daemon fail.
  seeder:
    image: busybox:1.37
    volumes:
      - backup-src:/backup
      - backup-src-b:/backup-b
      - shared-token:/shared
      - node-a-data:/data-a
      - node-b-data:/data-b
      - node-c-data:/data-c
      - node-d-data:/data-d
    command:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /backup/nested/sub
        printf 'hello swarm\n' > /backup/hello.txt
        printf 'nested greeting\n' > /backup/nested/greet.txt
        dd if=/dev/urandom of=/backup/nested/sub/big.bin bs=1M count=3 status=none
        mkdir -p /backup-b/from-founder
        printf 'founder backup payload\n' > /backup-b/from-founder/note.txt
        dd if=/dev/urandom of=/backup-b/from-founder/blob.bin bs=1M count=2 status=none
        chown -R 65532:65532 /backup /backup-b /shared /data-a /data-b /data-c /data-d
        echo "prep done: seeded /backup and /backup-b and chowned volumes to nonroot"
    restart: "no"

  node-b:
    build: .
    image: backupswarm:dev
    depends_on:
      seeder:
        condition: service_completed_successfully
    volumes:
      - node-b-data:/data
      - backup-src-b:/backup-b:ro
      - shared-token:/shared
    networks:
      swarm:
        ipv4_address: 172.28.0.20
    command:
      - --data-dir
      - /data
      - run
      - --listen
      - 172.28.0.20:7777
      - --invite
      - --token-out
      - /shared/token-a.txt
      - --backup-dir
      - /backup-b
      - --scan-interval
      - 5s

  node-a:
    build: .
    image: backupswarm:dev
    depends_on:
      seeder:
        condition: service_completed_successfully
      node-b:
        condition: service_started
    volumes:
      - node-a-data:/data
      - backup-src:/backup:ro
      - shared-token:/shared
    networks:
      swarm:
        ipv4_address: 172.28.0.21
    command:
      - --data-dir
      - /data
      - join
      - --token-file
      - /shared/token-a.txt
      - --timeout
      - 2m
      - --then-run
      - --backup-dir
      - /backup
      - --listen
      - 172.28.0.21:7778
      - --scan-interval
      - 5s

  # Oneshot: issues a fresh invite against node-b's running daemon by
  # opening invites.db on the shared data volume. --wait absorbs the
  # startup race where node-b's daemon hasn't yet written listen.addr.
  inviter-c:
    image: backupswarm:dev
    depends_on:
      node-b:
        condition: service_started
    volumes:
      - node-b-data:/data
      - shared-token:/shared
    command:
      - --data-dir
      - /data
      - invite
      - --wait
      - 30s
      - --token-out
      - /shared/token-c.txt
    restart: "no"

  node-c:
    build: .
    image: backupswarm:dev
    depends_on:
      seeder:
        condition: service_completed_successfully
      inviter-c:
        condition: service_completed_successfully
    volumes:
      - node-c-data:/data
      - shared-token:/shared
    networks:
      swarm:
        ipv4_address: 172.28.0.22
    command:
      - --data-dir
      - /data
      - join
      - --token-file
      - /shared/token-c.txt
      - --timeout
      - 2m
      - --then-run
      - --listen
      - 172.28.0.22:7779

  # Oneshot: issues a second invite against node-b for node-d. Depends
  # on node-c so node-d's join lands after node-a has processed node-c.
  inviter-d:
    image: backupswarm:dev
    depends_on:
      node-c:
        condition: service_started
    volumes:
      - node-b-data:/data
      - shared-token:/shared
    command:
      - --data-dir
      - /data
      - invite
      - --wait
      - 30s
      - --token-out
      - /shared/token-d.txt
    restart: "no"

  # Oneshot: sleeps to let node-b's pending-invite poll (1s interval)
  # pick up inviter-d's secret before node-d opens its TLS handshake,
  # else node-d is rejected at VerifyPeer with `tls: bad certificate`.
  invite-pickup-delay-d:
    image: busybox:1.37
    depends_on:
      inviter-d:
        condition: service_completed_successfully
    command: sh -c "sleep 3"
    restart: "no"

  node-d:
    build: .
    image: backupswarm:dev
    depends_on:
      seeder:
        condition: service_completed_successfully
      invite-pickup-delay-d:
        condition: service_completed_successfully
    volumes:
      - node-d-data:/data
      - shared-token:/shared
    networks:
      swarm:
        ipv4_address: 172.28.0.23
    command:
      - --data-dir
      - /data
      - join
      - --token-file
      - /shared/token-d.txt
      - --timeout
      - 2m
      - --then-run
      - --listen
      - 172.28.0.23:7780

networks:
  swarm:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  node-a-data:
  node-b-data:
  node-c-data:
  node-d-data:
  backup-src:
  backup-src-b:
  shared-token:
